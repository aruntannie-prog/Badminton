name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to manually trigger the build from the GitHub UI

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --clean

      - name: Build Android Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Sign APK
        run: |
          # Find the unsigned release APK generated by Gradle
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "Found APK at $APK_PATH"
          
          # Generate a local generic keystore for signing the APK
          keytool -genkey -v -keystore release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Badminton" -storepass android -keypass android
          
          # Find the latest Android build tools version for zipalign and apksigner
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          
          # Zipalign the APK to optimize memory usage on device
          $BUILD_TOOLS/zipalign -v -p 4 $APK_PATH app-release-aligned.apk
          
          # Sign the aligned APK with the generic keystore so it can be installed on phones
          $BUILD_TOOLS/apksigner sign --ks release.keystore --ks-pass pass:android --out BadmintonSmartScore.apk app-release-aligned.apk

      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BadmintonSmartScore-APK
          path: BadmintonSmartScore.apk
